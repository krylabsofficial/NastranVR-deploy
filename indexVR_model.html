<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastran VR Viewer - Embedded Model</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/vr-ui.css">
    <style>
        #auto-load-info {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 30, 30, 0.95);
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #43e97b;
            color: #fff;
            text-align: center;
            z-index: 1000;
            max-width: 500px;
        }
        #auto-load-info h2 {
            color: #43e97b;
            margin-top: 0;
        }
        #auto-load-info .spinner {
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-content">
            <h1>Nastran VR Viewer</h1>
            <p>Loading application...</p>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Scaling factor selector (shown before loading) -->
    <div id="scaling-selector" style="display: none;">
        <div style="background: rgba(30, 30, 30, 0.95); padding: 40px; border-radius: 12px; border: 2px solid #43e97b; max-width: 500px;">
            <h2 style="color: #43e97b; margin-top: 0;">Select Model Units</h2>
            <p style="color: #fff; margin: 20px 0;">Choose the unit system for the embedded model:</p>
            <p style="color: #fff; font-size: 0.9em; margin: 10px 0;">Model: <span style="color: #43e97b;">sample_model.bdf</span></p>
            
            <div style="margin-top: 30px;">
                <button class="scaling-btn" data-factor="1.0" style="
                    background: #2a2a3e;
                    color: #fff;
                    border: 2px solid #43e97b;
                    border-radius: 6px;
                    padding: 12px 24px;
                    margin: 8px;
                    font-size: 1.1em;
                    cursor: pointer;
                    transition: all 0.2s;
                ">Meters (1.0)</button>
                
                <button class="scaling-btn" data-factor="39.37" style="
                    background: #2a2a3e;
                    color: #fff;
                    border: 2px solid #43e97b;
                    border-radius: 6px;
                    padding: 12px 24px;
                    margin: 8px;
                    font-size: 1.1em;
                    cursor: pointer;
                    transition: all 0.2s;
                ">Inches (39.37)</button>
                
                <button class="scaling-btn" data-factor="1000" style="
                    background: #2a2a3e;
                    color: #fff;
                    border: 2px solid #43e97b;
                    border-radius: 6px;
                    padding: 12px 24px;
                    margin: 8px;
                    font-size: 1.1em;
                    cursor: pointer;
                    transition: all 0.2s;
                ">Millimeters (1000)</button>
            </div>
        </div>
    </div>
    
    <!-- Auto-load info -->
    <div id="auto-load-info" style="display: none;">
        <h2>Loading Embedded Model</h2>
        <p>Automatically loading model data...</p>
        <div class="spinner"></div>
        <p id="loading-units-info" style="margin-top: 20px; font-size: 0.9em; color: #43e97b;">
            Model: sample_model.bdf<br>
            Scaling: <span id="selected-scale-display">Meters (1.0)</span>
        </p>
        <div id="debug-status" style="margin-top: 20px; font-family: monospace; font-size: 0.8em; color: #fff; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto;"></div>
    </div>

    <!-- VR Scene Container -->
    <div id="vr-container"></div>

    <!-- Hidden dummy elements for app initialization (not used in embedded mode) -->
    <input type="file" id="bdf-file-input" style="display: none;" />
    <input type="file" id="step-file-input" style="display: none;" />
    <button id="enter-vr-btn" style="display: none;"></button>
    <div id="file-info" style="display: none;"></div>
    <div id="model-stats" style="display: none;"></div>
    <div id="upload-ui" style="display: none;"></div>

    <!-- In-VR UI Panel (will be positioned in 3D space) -->
    <div id="vr-info-panel" style="display: none;">
        <div class="vr-panel-content">
            <h3>Model Information</h3>
            <div id="vr-stats"></div>
        </div>
    </div>

    <!-- Error Display -->
    <div id="error-display" style="display: none;">
        <div class="error-content">
            <h3>Error</h3>
            <p id="error-message"></p>
            <button onclick="location.reload()">Reload</button>
        </div>
    </div>

    <!-- Load Three.js -->
    <script src="libs/three.min.js"></script>
    
    <!-- WebXR Polyfill for broader compatibility -->
    <script src="https://cdn.jsdelivr.net/npm/webxr-polyfill@latest/build/webxr-polyfill.min.js"></script>
    
    <!-- Load application modules -->
    <script src="js/shared/utils.js"></script>
    <script src="js/shared/nastran-parser.js"></script>
    <script src="js/shared/step-loader.js"></script>
    <script src="js/vr/vr-controller.js"></script>
    <script src="js/vr/controller-menu.js"></script>
    <script src="js/vr/hud.js"></script>
    
    <!-- Modified app loader that auto-loads embedded data -->
    <script>
        // Flag to tell app.js to skip the file upload UI
        window.embeddedModelMode = true;
        
        // Default scaling factor (will be set by user selection)
        window.model_scaling_factor = 1.0;
        
        // Function to add debug status
        function addDebugStatus(message) {
            console.log(message);
            const debugDiv = document.getElementById('debug-status');
            if (debugDiv) {
                debugDiv.innerHTML += message + '<br>';
            }
        }
        
        // Show scaling selector and wait for user choice
        function showScalingSelector() {
            return new Promise((resolve) => {
                const selector = document.getElementById('scaling-selector');
                const loadingScreen = document.getElementById('loading-screen');
                
                console.log('showScalingSelector: hiding loading screen, showing selector');
                
                // Hide loading screen, show selector
                if (loadingScreen) loadingScreen.style.display = 'none';
                if (selector) {
                    selector.style.cssText = `
                        position: fixed;
                        top: 50%;
                        left: 50%;
                        transform: translate(-50%, -50%);
                        z-index: 10000;
                        text-align: center;
                        display: block !important;
                    `;
                    console.log('Scaling selector should now be visible');
                }
                
                // Add click handlers to scaling buttons
                const buttons = selector.querySelectorAll('.scaling-btn');
                buttons.forEach(btn => {
                    btn.addEventListener('mouseenter', function() {
                        this.style.background = '#43e97b';
                        this.style.color = '#1a1a2e';
                        this.style.borderColor = '#fff';
                    });
                    btn.addEventListener('mouseleave', function() {
                        this.style.background = '#2a2a3e';
                        this.style.color = '#fff';
                        this.style.borderColor = '#43e97b';
                    });
                    btn.addEventListener('click', function() {
                        const factor = parseFloat(this.getAttribute('data-factor'));
                        const label = this.textContent;
                        window.model_scaling_factor = factor;
                        
                        // Update display
                        const displaySpan = document.getElementById('selected-scale-display');
                        if (displaySpan) displaySpan.textContent = label;
                        
                        // Hide selector
                        if (selector) selector.style.display = 'none';
                        
                        console.log(`User selected scaling factor: ${factor} (${label})`);
                        resolve(factor);
                    });
                });
            });
        }
        
        // Function to add debug status
        function addDebugStatus(message) {
            console.log(message);
            const debugDiv = document.getElementById('debug-status');
            if (debugDiv) {
                debugDiv.innerHTML += message + '<br>';
            }
        }
        
        // Function to wait for app initialization
        async function waitForApp(maxAttempts = 20) {
            for (let i = 0; i < maxAttempts; i++) {
                addDebugStatus(`Waiting for app... attempt ${i + 1}/${maxAttempts}`);
                if (window.app) {
                    return window.app;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }
            throw new Error('App failed to initialize after ' + maxAttempts + ' attempts');
        }
        
        // Auto-load embedded BDF data after app initializes
        async function autoLoadEmbeddedModel() {
            try {
                console.log('=== AUTO-LOAD STARTING ===');
                addDebugStatus('=== AUTO-LOAD STARTING ===');
                
                // First, show scaling selector and wait for user choice
                console.log('Showing scaling factor selector...');
                addDebugStatus('Showing scaling factor selector...');
                const scalingFactor = await showScalingSelector();
                console.log(`User selected scaling: ${scalingFactor}`);
                addDebugStatus(`User selected scaling: ${scalingFactor}`);
                
                console.log('Auto-loading embedded BDF data...');
                addDebugStatus('Auto-loading embedded BDF data...');
                
                // Show auto-load info
                const autoLoadInfo = document.getElementById('auto-load-info');
                if (autoLoadInfo) {
                    autoLoadInfo.style.display = 'block';
                }
                
                // Get embedded BDF data
                const bdfScript = document.getElementById('embedded-bdf-data');
                if (!bdfScript) {
                    throw new Error('No embedded BDF data found!');
                }
                
                const bdfContent = bdfScript.textContent.trim();
                addDebugStatus(`Loaded BDF data: ${bdfContent.length} chars`);
                
                // Scaling factor already set by user selection
                addDebugStatus(`Using scaling factor: ${window.model_scaling_factor}`);
                
                // Wait for app to initialize
                addDebugStatus('Waiting for app to initialize...');
                const app = await waitForApp();
                addDebugStatus('App initialized successfully!');
                
                // Hide loading screen and auto-load info
                if (app.loadingScreen) {
                    app.loadingScreen.style.display = 'none';
                }
                if (autoLoadInfo) {
                    // Keep it visible for now to show debug status
                    // autoLoadInfo.style.display = 'none';
                }
                
                // Parse the BDF data
                addDebugStatus('Parsing embedded BDF data...');
                const parser = new NastranParser();
                const modelData = parser.parse(bdfContent);
                
                // Store model data in app
                app.modelData = modelData;
                app.loadedBdfFile = 'sample_model.bdf';
                app.bdfScalingFactor = window.model_scaling_factor;
                
                // Display statistics (stats are in modelData.stats)
                const stats = modelData.stats;
                addDebugStatus('Model stats: ' + JSON.stringify(stats));
                
                // Create visualization
                addDebugStatus('Creating model visualization...');
                app.createModelVisualization();
                
                // Show VR button (but don't require file upload UI)
                addDebugStatus('Model loaded successfully! Ready for VR.');
                
                // Create a simple "Enter VR" button overlay
                const vrButtonOverlay = document.createElement('div');
                vrButtonOverlay.id = 'vr-button-overlay';
                vrButtonOverlay.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    z-index: 1000;
                    text-align: center;
                `;
                vrButtonOverlay.innerHTML = `
                    <div style="background: rgba(30, 30, 30, 0.95); padding: 30px; border-radius: 12px; border: 2px solid #43e97b;">
                        <h2 style="color: #43e97b; margin-top: 0;">Model Loaded</h2>
                        <p style="color: #fff; margin: 20px 0;">sample_model.bdf</p>
                        <p style="color: #999; font-size: 0.9em; margin: 10px 0;">
                            ${stats.nodeCount} nodes, ${stats.cquad4Count + stats.ctria3Count} shells, ${stats.cbarCount + stats.crodCount} bars
                        </p>
                        <button id="embedded-enter-vr-btn" style="
                            background: #43e97b;
                            color: #1a1a2e;
                            border: none;
                            padding: 15px 40px;
                            font-size: 1.2em;
                            border-radius: 8px;
                            cursor: pointer;
                            font-weight: bold;
                        ">Enter VR</button>
                    </div>
                `;
                document.body.appendChild(vrButtonOverlay);
                
                // Wire up the button
                document.getElementById('embedded-enter-vr-btn').addEventListener('click', () => {
                    addDebugStatus('Enter VR button clicked');
                    vrButtonOverlay.style.display = 'none';
                    if (autoLoadInfo) autoLoadInfo.style.display = 'none';
                    app.enterVR();
                });
                
                addDebugStatus('=== AUTO-LOAD COMPLETE ===');
                    
            } catch (error) {
                addDebugStatus('ERROR: ' + error.message);
                console.error('Error during auto-load:', error);
                const autoLoadInfo = document.getElementById('auto-load-info');
                if (autoLoadInfo) {
                    autoLoadInfo.innerHTML = `
                        <h2 style="color: #e74c3c;">Error Loading Model</h2>
                        <p>${error.message}</p>
                        <div id="debug-status" style="margin-top: 20px; font-family: monospace; font-size: 0.8em; color: #fff; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto;"></div>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 20px; background: #43e97b; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer;">Reload</button>
                    `;
                    autoLoadInfo.style.display = 'block';
                }
            }
        }
        
        // Start auto-load when page is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', autoLoadEmbeddedModel);
        } else {
            autoLoadEmbeddedModel();
        }
    </script>
    
    <!-- Load main app (but modified by script above) -->
    <script src="js/vr/app.js"></script>
</body>
</html>
